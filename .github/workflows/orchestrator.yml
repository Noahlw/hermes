name: orchestrator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"        # hourly closure-listener pass
    - cron: "0 3 1 * *"        # monthly grand-map rebuild

jobs:
  closure-listener:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install orchestrator runtime
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run closure-listener + spec-extractor + impl-spawner pipeline
        env:
          HERMES_REPO: ${{ github.repository }}
          HERMES_STATE_FILE: orchestrator/state/processed.json
          GH_TOKEN: ${{ secrets.HERMES_GH_TOKEN }}
        run: |
          python -m orchestrator.closure_listener | \
            python -m orchestrator.spec_extractor | \
            python -m orchestrator.impl_spawner | \
            python -m orchestrator.grandmap_updater || true

  monthly-rebuild:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 1 * *'
    needs: closure-listener
    steps:
      - name: Trigger T-024 (Compile grand map)
        env:
          GH_TOKEN: ${{ secrets.HERMES_GH_TOKEN }}
        run: |
          python -c "from orchestrator.grandmap_updater import trigger_full_rebuild; trigger_full_rebuild()"
